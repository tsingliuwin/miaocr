[package]
edition = "2021"
name = "ocr-rs"
version = "2.2.2"
authors = ["ChenZibo <qw.54@163.com>"]
build = "build.rs"
exclude = [
    "assets/*",
    "tests/*",
    "benches/*",
    "*.png",
    "*.jpg",
    "res/*",
    "3rd_party/*",
    "models/*",
]
autolib = false
autobins = false
autoexamples = false
